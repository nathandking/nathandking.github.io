username: Nathan King
description: I am a Computer Science PhD candidate at the University of Waterloo. My research focuses on computational methods involving closest point surface representations, with a particular interest in geometry processing and physics-based animation applications. I also have experience with other common surface representations, e.g., level-sets, point clouds, and meshes. I am supervised by <a href="https://cs.uwaterloo.ca/~c2batty/">Christopher Batty</a> (UW) and <a href="https://steveruuth.org/">Steve Ruuth</a> (SFU).
    <br>
    <br> Prior to starting my PhD, I developed computer vision/image processing algorithms in the marine radar industry for 2 years. I completed my MSc in Applied and Computational Math at Simon Fraser University in 2015. I received my BSc in Applied Math and Physics (Joint Honours) at Memorial University of Newfoundland in 2013.
